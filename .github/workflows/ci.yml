name: CI — Build Check & Auto PR

on:
  push:
    branches:
      - dev

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Type Check + Next.js Build
  # ─────────────────────────────────────────────
  build:
    name: 🔨 Build & Type Check
    runs-on: ubuntu-latest

    env:
      # Inject all secrets as environment variables for the build
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER }}

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 TypeScript type check
        run: npx tsc --noEmit

      - name: 🏗️ Next.js build
        run: npm run build

  # ─────────────────────────────────────────────
  # Job 2: Auto-create PR to main (only if build passes)
  # ─────────────────────────────────────────────
  auto-pr:
    name: 🤖 Auto PR → main
    runs-on: ubuntu-latest
    needs: build # only runs if the build job succeeds
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔀 Create or update PR from dev → main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a PR from dev to main already exists
          EXISTING_PR=$(gh pr list \
            --base main \
            --head dev \
            --state open \
            --json number \
            --jq '.[0].number' \
            2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "✅ PR #$EXISTING_PR already exists from dev → main. Skipping creation."
          else
            echo "🚀 Creating new PR from dev → main..."
            gh pr create \
              --title "chore: promote dev → main [auto]" \
              --body "## 🚀 Automated Pull Request

          This PR was automatically created because:
          - ✅ TypeScript type check passed
          - ✅ Next.js build succeeded on \`dev\` branch

          **Triggered by commit:** \`${{ github.sha }}\`
          **Commit message:** ${{ github.event.head_commit.message }}
          **Author:** ${{ github.actor }}

          ---
          > Merge this PR to deploy to production on Vercel." \
              --base main \
              --head dev
          fi
